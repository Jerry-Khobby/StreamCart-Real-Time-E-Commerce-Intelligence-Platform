x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  env_file: .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
    MINIO_ENDPOINT: minio:9000
    MINIO_ROOT_USER: ${MINIO_ROOT_USER}
    MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    MINIO_BUCKET: ${MINIO_BUCKET}
    POSTGRES_HOST: postgres
    POSTGRES_PORT: "5432"
    POSTGRES_USER: ${POSTGRES_USER}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    USE_KAFKA: ${USE_KAFKA}
    KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
    KAFKA_TOPIC: ${KAFKA_TOPIC}
  volumes:
    - ./batch/dags:/opt/airflow/dags
    - ./batch/dbt:/opt/airflow/dbt
    - ./configs:/opt/airflow/configs
    - ./producer:/opt/airflow/producer
    - ./consumer:/opt/airflow/consumer
    - ./logs:/opt/airflow/logs
  networks:
    - streamcart-net
  restart: unless-stopped

services:
  # -------------------------------
  # PostgreSQL
  # -------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: stream-postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - streamcart-net
    restart: unless-stopped

  # -------------------------------
  # MinIO
  # -------------------------------
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: streamcart-minio
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - streamcart-net
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z-cpuv1
    container_name: streamcart-minio-init
    depends_on:
      minio:
        condition: service_healthy
    env_file: .env
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/${MINIO_BUCKET};
        mc anonymous set download local/${MINIO_BUCKET};
        echo 'Bucket ready.';
      "
    networks:
      - streamcart-net

  # -------------------------------
  # Airflow
  # -------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: streamcart-airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -c "
      airflow db upgrade &&
      airflow users create \
      --username admin \
      --password admin \
      --firstname Admin \
      --lastname User \
      --role Admin \
      --email admin@example.com || true
      "
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: streamcart-airflow-webserver
    command: airflow webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    container_name: streamcart-airflow-scheduler
    command: airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "airflow jobs check --job-type SchedulerJob --hostname $(hostname)",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  # -------------------------------
  # Kafka & Zookeeper
  # -------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.7
    container_name: streamcart-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - streamcart-net
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.7.7
    container_name: streamcart-kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kafka-topics --bootstrap-server kafka:9092 --list"]
      interval: 10s
      retries: 10
    networks:
      - streamcart-net
    restart: unless-stopped

  # -------------------------------
  # Spark
  # -------------------------------
  spark-master:
    image: apache/spark:3.5.0-python3
    container_name: streamcart-spark-master
    environment:
      SPARK_MODE: master
    ports:
      - "8081:8080"
      - "7077:7077"
    depends_on:
      - kafka
      - minio
    networks:
      - streamcart-net
    restart: unless-stopped

  spark-worker:
    image: apache/spark:3.5.0-python3
    container_name: streamcart-spark-worker
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
    depends_on:
      - spark-master
    networks:
      - streamcart-net
    restart: unless-stopped

  # -------------------------------
  # Superset
  # -------------------------------
  superset:
    image: apache/superset:latest
    container_name: streamcart-superset
    environment:
      SUPERSET_ENV: development
      SUPERSET_LOAD_EXAMPLES: "no"
      SUPERSET_SECRET_KEY: "supersecret"
    ports:
      - "8088:8088"
    depends_on:
      - postgres
    volumes:
      - superset-data:/app/superset_home
    networks:
      - streamcart-net
    restart: unless-stopped

  # -------------------------------
  # Grafana
  # -------------------------------
  grafana:
    image: grafana/grafana-oss:latest
    container_name: streamcart-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - postgres
    networks:
      - streamcart-net
    restart: unless-stopped

volumes:
  postgres-data:
  minio-data:
  superset-data:

networks:
  streamcart-net:
    driver: bridge
