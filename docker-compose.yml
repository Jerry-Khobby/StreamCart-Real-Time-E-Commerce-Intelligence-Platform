x-spark-common: &spark-common
  image: apache/spark:3.5.0-python3
  user: root
  env_file: .env
  environment:
    PYTHONPATH: /opt/airflow
  volumes:
    - ./consumer:/opt/airflow/consumer
    - ./producer:/opt/airflow/producer
    - ./logs:/opt/airflow/logs
    - ./data:/opt/airflow/data

  networks:
    - streamcart-net
  restart: unless-stopped

services:
  # ──────────────────────────────────────────────────────────────────────────
  # PostgreSQL
  # ──────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: streamcart-postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - streamcart-net
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────────────────────
  # MinIO
  # ──────────────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: streamcart-minio
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - streamcart-net
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z-cpuv1
    container_name: streamcart-minio-init
    depends_on:
      minio:
        condition: service_healthy
    env_file: .env
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/${MINIO_BUCKET};
        echo 'MinIO ready.';
      "
    networks:
      - streamcart-net
    restart: "no"

  # ──────────────────────────────────────────────────────────────────────────
  # Zookeeper
  # ──────────────────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.7
    container_name: streamcart-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 2181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - streamcart-net
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────────────────────
  # Kafka
  # ──────────────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.7.7
    container_name: streamcart-kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: "168"
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server kafka:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - streamcart-net
    restart: unless-stopped

  kafka-init:
    image: confluentinc/cp-kafka:7.7.7
    container_name: streamcart-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic transactions --partitions 5 --replication-factor 1;
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic clickstream --partitions 5 --replication-factor 1;
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic inventory_updates --partitions 5 --replication-factor 1;
        echo 'Topics ready.';
      "
    networks:
      - streamcart-net
    restart: "no"

  # ──────────────────────────────────────────────────────────────────────────
  # Data Generator
  # ──────────────────────────────────────────────────────────────────────────
  data-generator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: streamcart-data-generator
    env_file: .env
    environment:
      USE_KAFKA: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    command: python /opt/airflow/producer/data_generator.py --mode all
    volumes:
      - ./producer:/opt/airflow/producer
      - ./logs:/opt/airflow/logs
      - ./data:/opt/airflow/data
      - ./consumer:/opt/airflow/consumer
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    networks:
      - streamcart-net
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────────────────────
  # Spark
  # ──────────────────────────────────────────────────────────────────────────
  spark-master:
    <<: *spark-common
    container_name: streamcart-spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: "7077"
      SPARK_MASTER_WEBUI_PORT: "8080"
    ports:
      - "8081:8080"
      - "7077:7077"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  spark-worker:
    <<: *spark-common
    container_name: streamcart-spark-worker
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      SPARK_WORKER_CORES: "4"
      SPARK_WORKER_MEMORY: "4g"
    depends_on:
      spark-master:
        condition: service_healthy

  spark-bronze-job:
    <<: *spark-common
    container_name: streamcart-spark-bronze
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
    command: >
      /opt/spark/bin/spark-submit
        --master spark://spark-master:7077
        --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0,org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262
        --conf spark.hadoop.fs.s3a.endpoint=http://minio:9000
        --conf spark.hadoop.fs.s3a.access.key=${MINIO_ROOT_USER}
        --conf spark.hadoop.fs.s3a.secret.key=${MINIO_ROOT_PASSWORD}
        --conf spark.hadoop.fs.s3a.path.style.access=true
        --conf spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
        --conf spark.sql.shuffle.partitions=4
        /opt/airflow/consumer/spark_streaming.py
    depends_on:
      spark-master:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    restart: on-failure

  spark-silver-job:
    <<: *spark-common
    container_name: streamcart-spark-silver
    environment:
      PYTHONPATH: /opt/airflow
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
    command: >
      /opt/spark/bin/spark-submit
          --master spark://spark-master:7077
          --packages org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262
          --conf spark.hadoop.fs.s3a.endpoint=http://minio:9000
          --conf spark.hadoop.fs.s3a.access.key=${MINIO_ROOT_USER}
          --conf spark.hadoop.fs.s3a.secret.key=${MINIO_ROOT_PASSWORD}
          --conf spark.hadoop.fs.s3a.path.style.access=true
          --conf spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
          --conf spark.sql.shuffle.partitions=4
          --conf spark.driver.extraJavaOptions=-Dpython.path=/opt/airflow
          /opt/airflow/consumer/silver_processor.py
    volumes:
      - ./consumer:/opt/airflow/consumer # silver_processor.py lives here
      - ./producer:/opt/airflow/producer # needed for logging_config import
      - ./data:/opt/airflow/data
      - ./logs:/opt/airflow/logs

    depends_on:
      spark-master:
        condition: service_healthy
    restart: "no"
volumes:
  postgres-data:
  minio-data:

networks:
  streamcart-net:
    driver: bridge
